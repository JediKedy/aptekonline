<!DOCTYPE html>
<html lang="az" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aptek Online | Dərman Axtarış</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
        
        // Dark Mode Başlatma
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        [v-cloak] { display: none; }
        .glass { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .modal-active { overflow: hidden; }
        .product-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 transition-colors duration-300">

    <nav class="fixed w-full z-50 bg-white/70 dark:bg-zinc-950/70 border-b border-zinc-100 dark:border-zinc-900 glass">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2" onclick="location.reload()" class="cursor-pointer">
                <span class="w-3 h-3 rounded-full bg-blue-600 animate-pulse"></span>
                <h1 class="text-xl font-bold tracking-tighter uppercase">APTEK <span class="text-blue-600 dark:text-blue-400 font-normal lowercase">online</span></h1>
            </div>
            <button onclick="toggleDarkMode()" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-colors">
                <span id="theme-icon">🌙</span>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pt-32 pb-24">
        
        <div class="max-w-3xl mx-auto mb-16 text-center">
            <h2 class="text-3xl font-extrabold mb-6 tracking-tight">Dərman axtarışını <br><span class="text-blue-600">sadələşdirin.</span></h2>
            <div class="relative group">
                <input 
                    type="text" 
                    id="searchInput" 
                    oninput="liveSearch()" 
                    autocomplete="off" 
                    placeholder="Dərman adını yazın..." 
                    class="w-full p-6 bg-zinc-50 dark:bg-zinc-900/50 border border-zinc-100 dark:border-zinc-800 rounded-[2.5rem] outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-xl font-medium placeholder:text-zinc-400"
                >
                <div class="absolute right-6 top-1/2 -translate-y-1/2 flex items-center gap-3">
                    <button id="clearBtn" onclick="clearSearch()" class="hidden text-zinc-400 hover:text-red-500 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                    <div class="w-px h-6 bg-zinc-200 dark:bg-zinc-800"></div>
                    <svg class="w-6 h-6 text-zinc-300 dark:text-zinc-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
            </div>
        </div>

        <div id="loader" class="hidden flex flex-col items-center justify-center py-20 gap-4">
            <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-zinc-400 font-medium">Axtarılır...</p>
        </div>
        
        <div id="results" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20">
                <div class="text-5xl mb-4 opacity-20">💊</div>
                <h2 class="text-lg font-medium text-zinc-400 italic">Məlumat bazasında axtarış etmək üçün yazı daxil edin...</h2>
            </div>
        </div>
    </main>

    <div id="detailModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-zinc-950/60 backdrop-blur-md transition-opacity duration-300">
        <div id="modalContainer" class="bg-white dark:bg-zinc-900 w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden max-h-[90vh] flex flex-col scale-95 transition-transform duration-300 border dark:border-zinc-800">
            <div class="px-8 py-6 border-b dark:border-zinc-800 flex justify-between items-center bg-inherit">
                <span class="font-bold text-zinc-400 uppercase text-xs tracking-[0.2em]">Məhsul Detalı</span>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 transition-colors">&times;</button>
            </div>
            <div id="modalBody" class="p-8 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        let currentProducts = [];
        let searchTimeout = null;

        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
                icon.innerText = '🌙';
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
                icon.innerText = '☀️';
            }
        }

        // Başlanğıc ikon nizamı
        window.onload = () => {
            const icon = document.getElementById('theme-icon');
            icon.innerText = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
            document.getElementById('searchInput').value = '';
        };

        function clearSearch() {
            const input = document.getElementById('searchInput');
            input.value = '';
            document.getElementById('clearBtn').classList.add('hidden');
            document.getElementById('results').innerHTML = `<div class="col-span-full text-center py-20"><div class="text-5xl mb-4 opacity-20">💊</div><h2 class="text-lg font-medium text-zinc-400 italic">Məlumat bazasında axtarış etmək üçün yazı daxil edin...</h2></div>`;
        }

        function liveSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const clearBtn = document.getElementById('clearBtn');
            
            if (query.length > 0) clearBtn.classList.remove('hidden');
            else clearBtn.classList.add('hidden');

            clearTimeout(searchTimeout);
            if (query.length < 2) return;
            searchTimeout = setTimeout(() => searchMedicine(query), 400);
        }

        async function searchMedicine(query) {
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            try {
                const url = `https://aptekonline.az/shop/productList?keywords=${encodeURIComponent(query)}&lang=az`;
                const response = await fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
                const data = await response.json();
                
                currentProducts = data.data || [];
                const thumbFolder = data.thumb_folder || "";

                if (currentProducts.length === 0) {
                    resultsDiv.innerHTML = `<div class="col-span-full text-center py-20 text-zinc-400 italic font-medium">Heç bir dərman tapılmadı.</div>`;
                } else {
                    resultsDiv.innerHTML = '';
                    currentProducts.forEach((item, index) => {
                        resultsDiv.innerHTML += `
                            <article class="product-card group bg-zinc-50 dark:bg-zinc-900/40 border border-zinc-100 dark:border-zinc-800 rounded-[2rem] p-6 cursor-pointer flex flex-col" onclick="showDetail(${index}, '${thumbFolder}')">
                                <div class="bg-white dark:bg-zinc-950 rounded-2xl mb-6 p-4 flex items-center justify-center h-48 border border-zinc-50 dark:border-zinc-900 overflow-hidden shadow-inner">
                                    <img src="${thumbFolder}${item.thumb1}" class="max-h-full object-contain group-hover:scale-110 transition-transform duration-500" alt="${item.name}">
                                </div>
                                <h3 class="font-bold text-zinc-800 dark:text-zinc-100 leading-tight mb-4 text-lg line-clamp-2 h-14">${item.name}</h3>
                                <div class="mt-auto flex items-center justify-between pt-6 border-t dark:border-zinc-800">
                                    <span class="text-2xl font-black text-blue-600 dark:text-blue-400">${item.price} AZN</span>
                                    <span class="w-10 h-10 flex items-center justify-center bg-blue-600 text-white rounded-full group-hover:rotate-45 transition-transform">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 12h14m-7-7l7 7-7 7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                    </span>
                                </div>
                            </article>`;
                    });
                }
            } catch (err) {
                resultsDiv.innerHTML = `<p class="col-span-full text-red-500 text-center py-20">Bağlantı xətası.</p>`;
            } finally {
                loader.classList.add('hidden');
            }
        }

        function showDetail(index, thumbBase) {
            const item = currentProducts[index];
            const modal = document.getElementById('detailModal');
            const container = document.getElementById('modalContainer');
            const body = document.getElementById('modalBody');
            const officialUrl = `https://aptekonline.az/product/${item.url_id}`;

            body.innerHTML = `
                <div class="grid md:grid-cols-2 gap-8 mb-8">
                    <div class="bg-zinc-50 dark:bg-zinc-950 rounded-3xl p-6 flex items-center justify-center border dark:border-zinc-800 shadow-inner">
                        <img src="${thumbBase}${item.thumb1}" class="max-h-64 object-contain">
                    </div>
                    <div class="flex flex-col justify-center">
                        <h2 class="text-3xl font-extrabold text-zinc-900 dark:text-white mb-4 leading-tight">${item.name}</h2>
                        <div class="text-3xl font-black text-blue-600 dark:text-blue-400 mb-6">${item.price} AZN</div>
                        
                        <div class="space-y-4 text-sm bg-zinc-50 dark:bg-zinc-950 p-6 rounded-2xl border dark:border-zinc-800">
                            <div class="flex justify-between">
                                <span class="text-zinc-400 italic">Tərkib</span> 
                                <span class="font-bold text-zinc-800 dark:text-zinc-200">${item.terkib || '-'}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-zinc-400 italic">Ölkə</span> 
                                <span class="font-bold text-zinc-800 dark:text-zinc-200">${item.olke || '-'}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-zinc-400 italic">Vahid</span> 
                                <span class="font-bold text-zinc-800 dark:text-zinc-200">${item.vahid || 'N1'}</span>
                            </div>
                        </div>
                    </div>
                </div>
                <a href="${officialUrl}" target="_blank" class="w-full flex items-center justify-center gap-3 bg-zinc-900 dark:bg-blue-600 text-white px-8 py-5 rounded-2xl font-bold hover:bg-zinc-800 transition-all shadow-xl">
                    Aptekonline.az saytında bax
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </a>`;

            modal.classList.remove('hidden');
            setTimeout(() => container.classList.replace('scale-95', 'scale-100'), 10);
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            const container = document.getElementById('modalContainer');
            container.classList.replace('scale-100', 'scale-95');
            setTimeout(() => {
                document.getElementById('detailModal').classList.add('hidden');
                document.body.classList.remove('modal-active');
            }, 200);
        }

        document.getElementById('detailModal').addEventListener('click', (e) => {
            if(e.target.id === 'detailModal') closeModal();
        });
    </script>
</body>
</html>
