<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aptek Online - Sadə axtarış sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        
        function initTheme() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        initTheme();

        // SƏHİFƏ YENİLƏNƏNDƏ INPUTU SİLİR
        window.onload = function() {
            const input = document.getElementById('searchInput');
            if(input) {
                input.value = '';
                input.focus(); // Rahatlıq üçün birbaşa fokuslansın
            }
            updateIcons(document.documentElement.classList.contains('dark'));
        };
    </script>
    <style>
        .modal-active { overflow: hidden; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-5px); }
        #modalBody::-webkit-scrollbar { width: 6px; }
        #modalBody::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark #modalBody::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 font-sans text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <header class="bg-white dark:bg-slate-800 border-b dark:border-slate-700 sticky top-0 z-40 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center justify-between w-full md:w-auto">
                <h1 class="text-2xl font-black text-blue-600 dark:text-blue-400 tracking-tight cursor-pointer" onclick="location.reload()">
                    APTEK<span class="text-slate-400 font-light">ONLINE</span>
                </h1>
                <button onclick="toggleDarkMode()" class="md:hidden p-2 rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-yellow-400">
                    <span id="theme-icon-mobile">🌙</span>
                </button>
            </div>
            
            <div class="relative flex-1 max-w-md w-full flex items-center gap-3">
                <div class="relative flex-1 group">
                    <input type="text" id="searchInput" oninput="liveSearch()" autocomplete="off" placeholder="Dərman adını yazın..." 
                        class="w-full pl-5 pr-12 py-3 bg-slate-100 dark:bg-slate-700 border-none rounded-full focus:ring-2 focus:ring-blue-500 outline-none transition-all dark:placeholder-slate-400">
                    
                    <button id="clearBtn" onclick="clearSearch()" class="hidden absolute right-4 top-3 text-slate-400 hover:text-red-500 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                
                <button onclick="toggleDarkMode()" class="hidden md:flex p-3 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-yellow-400 hover:scale-110 transition-all">
                    <span id="theme-icon-desktop">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 lg:p-8 min-h-screen">
        <div id="loader" class="hidden flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
            <p class="text-slate-500 dark:text-slate-400 animate-pulse">Axtarılır...</p>
        </div>
        
        <div id="results" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20">
                <div class="text-6xl mb-4 grayscale dark:grayscale-0">💊</div>
                <h2 class="text-xl font-medium text-slate-400 dark:text-slate-500">Dərman adını daxil edin...</h2>
            </div>
        </div>
    </main>

    <div id="detailModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm transition-opacity">
        <div class="bg-white dark:bg-slate-800 w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col scale-95 transition-transform duration-300 border dark:border-slate-700" id="modalContainer">
            <div class="p-5 border-b dark:border-slate-700 flex justify-between items-center bg-inherit">
                <span class="font-bold text-slate-400 uppercase text-xs tracking-widest">Məhsulun Tam Təsviri</span>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-red-50 dark:hover:bg-red-900/30 text-slate-400 hover:text-red-500 text-2xl">&times;</button>
            </div>
            <div id="modalBody" class="p-6 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        let currentProducts = [];
        let searchTimeout = null;

        function toggleDarkMode() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
                updateIcons(false);
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
                updateIcons(true);
            }
        }

        function updateIcons(isDark) {
            const mobileIcon = document.getElementById('theme-icon-mobile');
            const desktopIcon = document.getElementById('theme-icon-desktop');
            if(mobileIcon) mobileIcon.innerText = isDark ? '☀️' : '🌙';
            if(desktopIcon) desktopIcon.innerText = isDark ? '☀️' : '🌙';
        }

        function clearSearch() {
            const input = document.getElementById('searchInput');
            input.value = '';
            input.focus();
            document.getElementById('clearBtn').classList.add('hidden');
            document.getElementById('results').innerHTML = `
                <div class="col-span-full text-center py-20">
                    <div class="text-6xl mb-4 grayscale dark:grayscale-0">💊</div>
                    <h2 class="text-xl font-medium text-slate-400 dark:text-slate-500">Dərman adını daxil edin...</h2>
                </div>`;
            currentProducts = [];
        }

        function liveSearch() {
            const input = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearBtn');
            const query = input.value.trim();
            
            if (query.length > 0) clearBtn.classList.remove('hidden');
            else clearBtn.classList.add('hidden');

            clearTimeout(searchTimeout);
            
            if (query.length < 2) {
                if (query.length === 0) clearSearch();
                return;
            }

            searchTimeout = setTimeout(() => {
                searchMedicine(query);
            }, 400);
        }

        async function searchMedicine(query) {
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            try {
                const url = `https://aptekonline.az/shop/productList?keywords=${encodeURIComponent(query)}&lang=az`;
                const response = await fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
                const data = await response.json();
                
                currentProducts = data.data || [];
                const thumbFolder = data.thumb_folder || "";

                if (currentProducts.length === 0) {
                    resultsDiv.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400 italic font-medium tracking-wide">Dəqiq nəticə tapılmadı :(</div>`;
                } else {
                    resultsDiv.innerHTML = '';
                    currentProducts.forEach((item, index) => {
                        resultsDiv.innerHTML += `
                            <div class="product-card bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-5 cursor-pointer flex flex-col group" onclick="showDetail(${index}, '${thumbFolder}')">
                                <div class="bg-slate-50 dark:bg-slate-900 rounded-xl mb-4 p-2 flex items-center justify-center">
                                    <img src="${thumbFolder}${item.thumb1}" class="h-40 object-contain group-hover:scale-105 transition-transform" alt="${item.name}">
                                </div>
                                <h3 class="font-bold text-slate-800 dark:text-slate-100 h-12 overflow-hidden leading-tight mb-2 text-lg">${item.name}</h3>
                                <div class="mt-auto flex items-center justify-between pt-4 border-t dark:border-slate-700">
                                    <span class="text-2xl font-black text-blue-600 dark:text-blue-400">${item.price} AZN</span>
                                    <span class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider">Bax</span>
                                </div>
                            </div>`;
                    });
                }
            } catch (err) {
                resultsDiv.innerHTML = `<p class="col-span-full text-red-400 text-center py-20 italic">Bağlantı xətası baş verdi.</p>`;
            } finally {
                loader.classList.add('hidden');
            }
        }

        function showDetail(index, thumbBase) {
            const item = currentProducts[index];
            const modal = document.getElementById('detailModal');
            const container = document.getElementById('modalContainer');
            const body = document.getElementById('modalBody');
            const officialUrl = `https://aptekonline.az/product/${item.url_id}`;

            body.innerHTML = `
                <div class="flex flex-col md:flex-row gap-8 mb-8">
                    <div class="w-full md:w-64 flex-shrink-0 bg-white dark:bg-slate-900 rounded-2xl border dark:border-slate-700 p-4 shadow-inner flex items-center justify-center">
                        <img src="${thumbBase}${item.thumb1}" class="max-h-56 object-contain">
                    </div>
                    <div class="flex-1">
                        <h2 class="text-2xl font-black text-slate-900 dark:text-white leading-tight mb-4">${item.name}</h2>
                        <div class="inline-block bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 text-3xl font-black px-4 py-2 rounded-2xl mb-6">
                            ${item.price} AZN
                        </div>
                        <div class="space-y-4 border-t dark:border-slate-700 pt-6 text-sm">
                            <div class="flex justify-between">
                                <span class="text-slate-400 italic font-bold">Tərkib:</span> 
                                <span class="font-bold text-slate-800 dark:text-slate-200">${item.terkib || 'Məlum deyil'}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-slate-400 italic font-bold">Ölkə:</span> 
                                <span class="font-bold text-slate-800 dark:text-slate-200">${item.olke || 'Məlum deyil'}</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-slate-50 dark:bg-slate-900/50 p-6 rounded-3xl border dark:border-slate-700">
                    <p class="text-slate-600 dark:text-slate-400 text-sm mb-6">
                        ${item.name_ru ? `Rusca: ${item.name_ru}<br>` : ''}
                        Vahid: ${item.vahid || 'N1'}
                    </p>
                    <a href="${officialUrl}" target="_blank" class="flex items-center justify-center gap-3 bg-blue-600 text-white px-6 py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 dark:shadow-none">
                        Rəsmi Səhifəyə Keçid
                    </a>
                </div>`;

            modal.classList.remove('hidden');
            setTimeout(() => container.classList.replace('scale-95', 'scale-100'), 10);
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            const container = document.getElementById('modalContainer');
            container.classList.replace('scale-100', 'scale-95');
            setTimeout(() => {
                document.getElementById('detailModal').classList.add('hidden');
                document.body.classList.remove('modal-active');
            }, 200);
        }

        document.getElementById('detailModal').addEventListener('click', (e) => {
            if(e.target.id === 'detailModal') closeModal();
        });
    </script>
</body>
</html>
