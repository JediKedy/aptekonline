<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürətli Aptek Axtarışı</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-blue-600 p-4 text-white shadow-lg text-center">
        <h1 class="text-2xl font-bold">💊 Yeni Aptek Portalı</h1>
        <p class="text-sm opacity-80">Reklamsız və sürətli dərman axtarışı</p>
    </nav>

    <div class="max-w-2xl mx-auto mt-10 px-4">
        <div class="flex gap-2">
            <input type="text" id="searchInput" placeholder="Dərman adını yazın..." 
                class="w-full p-3 border-2 border-blue-200 rounded-lg focus:outline-none focus:border-blue-500 shadow-sm">
            <button onclick="searchMedicine()" id="searchBtn" 
                class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition">
                Axtar
            </button>
        </div>
        <div id="loader" class="hidden text-center mt-4 text-blue-600 font-semibold italic">Məlumatlar gətirilir...</div>
    </div>

    <div id="results" class="max-w-4xl mx-auto mt-8 grid grid-cols-1 md:grid-cols-2 gap-4 px-4 pb-10">
        </div>

    <script>
        async function searchMedicine() {
            const query = document.getElementById('searchInput').value;
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            
            if (!query) return alert("Lütfən bir ad yazın!");

            loader.classList.remove('hidden');
            resultsDiv.innerHTML = '';

            try {
                // API-yə birbaşa sorğu
                const url = `https://aptekonline.az/shop/productList?keywords=${encodeURIComponent(query)}&lang=az`;
                const response = await fetch(url, {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
                
                const data = await response.json();
                const thumbFolder = data.thumb_folder || "";
                
                if (!data.data || data.data.length === 0) {
                    resultsDiv.innerHTML = `<p class="text-center text-gray-500 col-span-full">Təəssüf, heç nə tapılmadı.</p>`;
                } else {
                    data.data.forEach(item => {
                        resultsDiv.innerHTML += `
                            <div class="bg-white p-4 rounded-xl shadow-md border border-gray-100 flex gap-4 items-start">
                                <img src="${thumbFolder}${item.thumb1}" class="w-24 h-24 object-contain bg-gray-50 rounded" alt="${item.name}">
                                <div class="flex-1">
                                    <h3 class="font-bold text-gray-800 leading-tight">${item.name}</h3>
                                    <p class="text-sm text-gray-500 mt-1">🧪 ${item.terkib || 'Məlum deyil'}</p>
                                    <p class="text-sm text-gray-400">🌍 ${item.olke || ''}</p>
                                    <div class="mt-3 flex justify-between items-center">
                                        <span class="text-xl font-black text-green-600">${item.price} AZN</span>
                                        <button class="bg-blue-100 text-blue-700 text-xs px-3 py-1 rounded-full font-bold">Detallı</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (error) {
                console.error(error);
                resultsDiv.innerHTML = `<p class="text-center text-red-500 col-span-full italic">Xəta: Brauzer CORS qoruması bu sorğuya mane ola bilər.</p>`;
            } finally {
                loader.classList.add('hidden');
            }
        }

        // Enter düyməsi ilə axtarış
        document.getElementById('searchInput').addEventListener("keypress", (e) => {
            if (e.key === "Enter") searchMedicine();
        });
    </script>
</body>
</html>
