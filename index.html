<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aptek Portalı - Detallı Axtarış</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-active { overflow: hidden; }
        .product-card:hover { transform: translateY(-3px); transition: 0.2s; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <header class="bg-white border-b sticky top-0 z-40 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 tracking-tight cursor-pointer" onclick="location.reload()">APTEK<span class="text-slate-400 font-light">PRO</span></h1>
            <div class="relative flex-1 max-w-md mx-6">
                <input type="text" id="searchInput" placeholder="Dərman və ya tərkib axtar..." 
                    class="w-full pl-4 pr-12 py-2.5 bg-slate-100 border-none rounded-full focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="searchMedicine()" class="absolute right-2 top-1.5 bg-blue-600 text-white p-1.5 rounded-full hover:bg-blue-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 lg:p-8">
        <div id="loader" class="hidden flex justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        </div>
        
        <div id="results" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="detailModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
            <div class="p-4 border-b flex justify-between items-center bg-slate-50">
                <span class="font-bold text-slate-500 uppercase text-xs tracking-widest">Məhsul Detalları</span>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 text-2xl">&times;</button>
            </div>
            <div id="modalBody" class="p-6 overflow-y-auto">
                </div>
        </div>
    </div>

    <script>
        let currentProducts = [];

        async function searchMedicine() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;

            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            
            loader.classList.remove('hidden');
            resultsDiv.innerHTML = '';

            try {
                const url = `https://aptekonline.az/shop/productList?keywords=${encodeURIComponent(query)}&lang=az`;
                const response = await fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
                const data = await response.json();
                
                currentProducts = data.data || [];
                const thumbFolder = data.thumb_folder || "";

                if (currentProducts.length === 0) {
                    resultsDiv.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400 text-xl font-medium">Heç bir nəticə tapılmadı :(</div>`;
                } else {
                    currentProducts.forEach((item, index) => {
                        resultsDiv.innerHTML += `
                            <div class="product-card bg-white rounded-2xl shadow-sm border border-slate-100 p-5 cursor-pointer" onclick="showDetail(${index}, '${thumbFolder}')">
                                <img src="${thumbFolder}${item.thumb1}" class="w-full h-48 object-contain mb-4 rounded-lg bg-slate-50" alt="${item.name}">
                                <h3 class="font-bold text-slate-800 h-12 overflow-hidden leading-tight mb-2">${item.name}</h3>
                                <div class="flex items-center justify-between mt-4">
                                    <span class="text-2xl font-black text-blue-600">${item.price} <small class="text-sm">AZN</small></span>
                                    <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">Detallı</span>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (err) {
                resultsDiv.innerHTML = `<p class="col-span-full text-red-400 text-center">Xəta baş verdi. Zəhmət olmasa biraz sonra yenidən yoxlayın.</p>`;
            } finally {
                loader.classList.add('hidden');
            }
        }

        function showDetail(index, thumbBase) {
            const item = currentProducts[index];
            const modal = document.getElementById('detailModal');
            const body = document.getElementById('modalBody');

            body.innerHTML = `
                <div class="flex flex-col md:flex-row gap-8">
                    <img src="${thumbBase}${item.thumb1}" class="w-full md:w-64 h-64 object-contain rounded-xl border p-2 bg-white">
                    <div class="flex-1">
                        <h2 class="text-2xl font-bold text-slate-900 mb-2">${item.name}</h2>
                        <div class="text-3xl font-black text-green-600 mb-4">${item.price} AZN</div>
                        
                        <div class="space-y-3 border-t pt-4">
                            <p class="flex justify-between"><span class="text-slate-400">Tərkib:</span> <span class="font-medium text-slate-800 text-right ml-4">${item.terkib || 'Məlum deyil'}</span></p>
                            <p class="flex justify-between"><span class="text-slate-400">Ölkə:</span> <span class="font-medium text-slate-800">${item.olke || 'Məlum deyil'}</span></p>
                            <p class="flex justify-between"><span class="text-slate-400">Vahid:</span> <span class="font-medium text-slate-800">${item.vahid || 'N1'}</span></p>
                        </div>
                    </div>
                </div>
                <div class="mt-8 bg-slate-50 p-4 rounded-xl border border-dashed border-slate-200">
                    <h4 class="font-bold text-slate-700 mb-2">Qısa Təlimat / Qeyd:</h4>
                    <p class="text-slate-600 text-sm leading-relaxed">
                        ${item.name_ru ? `Rusca adı: ${item.name_ru}` : 'Bu məhsul üçün əlavə təlimat qeyd olunmayıb.'}
                    </p>
                </div>
            `;

            modal.classList.remove('hidden');
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
            document.body.classList.remove('modal-active');
        }

        document.getElementById('searchInput').addEventListener("keypress", e => e.key === "Enter" && searchMedicine());
    </script>
</body>
</html>
